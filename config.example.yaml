# PaperBreakfast configuration
# Copy this to config.yaml and edit — config.yaml is gitignored

# Path to your interest profile (plain text / markdown)
interest_profile_path: profile.md

# SQLite database path
db_path: paperbreakfast.db

# Optional: university library EZproxy host.
# When set, all paper links in the digest are rewritten through your proxy
# so you land directly on the full-text page without a separate login step.
# Example (USC): libproxy2.usc.edu
# Leave commented out if not needed.
# proxy_base_url: libproxy2.usc.edu

# --- Evaluator ---
# Switch backends and strategies independently.
#
# backend.type options:
#   claude        — Anthropic API (requires ANTHROPIC_API_KEY in .env)
#   openai_compat — LM Studio, Ollama, or any OpenAI-compatible server
#   keyword       — No LLM, pure keyword matching (good for testing)
#
# strategy.type options:
#   relevance_json    — Triage classification (read/skim/horizon/skip) + structured summary
#   chain_of_thought  — Step-by-step reasoning mapped to triage (legacy; for debugging)

evaluator:
  backend:
    type: claude
    model: claude-sonnet-4-6           # sonnet for quality; haiku-4-5-20251001 for lower cost
    temperature: 0.0                   # deterministic triage
    max_tokens: 4096
    # For openai_compat, also set:
    # base_url: http://localhost:1234/v1   # overrides OPENAI_COMPAT_BASE_URL
  strategy:
    type: relevance_json
  score_threshold: 0.6                 # used by eval benchmark to define "relevant" ground truth threshold
  chunk_size: 10                       # papers per LLM call; prompt cached across chunks
  use_batch: false                     # true = Anthropic Batch API (50% cost, async); incompatible with chunking

# --- Email digest ---
email:
  smtp_host: smtp.gmail.com
  smtp_port: 587              # 587 = STARTTLS, 465 = SSL
  smtp_user: your.address@gmail.com
  from_addr: your.address@gmail.com
  to_addrs:
    - digest@youraddress.com  # where digests are delivered
  send_hour: 8                # 24h local time, digest sent once daily

# --- Scheduler ---
scheduler:
  poll_interval_hours: 2     # how often to check RSS feeds
