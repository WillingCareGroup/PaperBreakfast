# RSS feed list for PaperBreakfast
#
# Fields:
#   url     — RSS feed URL (verify these are current; publishers occasionally change them)
#   name    — Display name used in the digest
#   group   — Logical grouping (for future filtering)
#   enabled — Set to false to temporarily skip a feed without deleting it
#
# URL patterns by publisher:
#   Cell Press:      https://www.cell.com/{journal-slug}/inpress.rss
#   Nature:          https://www.nature.com/{abbreviation}.rss
#   Science.org:     https://www.science.org/action/showFeed?type=etoc&feed=rss&jc={code}
#   Lancet/Elsevier: https://www.thelancet.com/rssfeed/{code}_current.xml
#   Wiley:           https://onlinelibrary.wiley.com/feed/{issn-no-hyphen}/most-recent
#   AACR/Silverchair: https://aacrjournals.org/{journal}/rss/current.xml
#   ASH/Silverchair: https://ashpublications.org/{journal}/rss/current.xml

feeds:

  # ── Cell Press ──────────────────────────────────────────────────────────────
  - url: https://www.cell.com/cell/inpress.rss
    name: Cell
    group: cell-press
    enabled: true

  - url: https://www.cell.com/cell-stem-cell/inpress.rss
    name: Cell Stem Cell
    group: cell-press
    enabled: true

  - url: https://www.cell.com/immunity/inpress.rss
